<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蚕宝宝守护精灵桑桑</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f6ffed; font-family: sans-serif; }
        #welcome-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e6f7ff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 85%; text-align: center; }
        h2 { color: #52c41a; font-size: 24px; }
        p { font-size: 18px; color: #595959; }
        input { width: 90%; padding: 15px; margin: 20px 0; border: 2px solid #b7eb8f; border-radius: 8px; font-size: 18px; outline: none; }
        button { background: #52c41a; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="welcome-mask">
        <div class="box">
            <h2>🌿 欢迎来到科学探究乐园</h2>
            <p>我是桑桑老师，请输入你的班级和姓名，准备开启今天的驱动问题挑战吧！</p>
            <input type="text" id="studentInput" placeholder="例如：五年级1班张小明">
            <button onclick="startChat()">进入观察档案 ✨</button>
        </div>
    </div>

    <script src="https://sf-cdn.coze.cn/obj/unpkg-va/flow-platform/chat-sdk-web/1.0.0-beta.2/index.js"></script>
    <script>
        const savedName = localStorage.getItem('sangsang_student_id');
        if (savedName) {
            document.getElementById('welcome-mask').style.display = 'none';
            fetchTokenAndInit(savedName);
        }

        function startChat() {
            const name = document.getElementById('studentInput').value.trim();
            if (!name) return alert('同学们，记得输入班级和姓名哦！');
            localStorage.setItem('sangsang_student_id', name);
            document.getElementById('welcome-mask').style.display = 'none';
            fetchTokenAndInit(name);
        }

        // 核心改动：不再把 Token 写死，而是向后台索要
        async function fetchTokenAndInit(userId) {
            try {
                const res = await fetch('/api/getToken');
                const data = await res.json();
                initCoze(userId, data.token);
            } catch(e) {
                alert('网络开小差了，请刷新页面重试哦！');
            }
        }

        function initCoze(userId, secureToken) {
            new CozeWebSDK.WebChatClient({
                config: {
                    bot_id: '7628621142705831979', // ！！！！请在这里填入那串数字 ID！！！！
                },
                componentProps: { title: '蚕宝宝守护精灵桑桑 🌿' },
                auth: {
                    type: 'token',
                    token: secureToken,
                    onRefreshToken: () => secureToken,
                },
                userInfo: { id: userId, nickname: userId }
            });
        }
    </script>
</body>
</html>
