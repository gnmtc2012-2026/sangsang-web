<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蚕宝宝守护精灵桑桑</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f6ffed; font-family: sans-serif; }
        #welcome-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e6f7ff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 85%; text-align: center; }
        h2 { color: #52c41a; font-size: 24px; margin-top: 0; }
        p { font-size: 16px; color: #595959; }
        input { width: 90%; padding: 15px; margin: 15px 0; border: 2px solid #b7eb8f; border-radius: 8px; font-size: 18px; outline: none; box-sizing: border-box; }
        button { background: #52c41a; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px;}
        
        /* 右上角切换按钮 */
        #switchUserBtn {
            position: fixed; top: 10px; right: 10px; z-index: 10000;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(4px);
            padding: 8px 15px; border-radius: 20px; font-size: 13px; color: #52c41a;
            border: 1px solid #b7eb8f; cursor: pointer; display: none;
        }
    </style>
</head>
<body>
    <div id="switchUserBtn" onclick="resetAndReload()">🔄 切换同学</div>

    <div id="welcome-mask">
        <div class="box">
            <h2>🌿 科学探究乐园</h2>
            <p>我是桑桑老师，请输入班级姓名开始记录：</p>
            <input type="text" id="studentInput" placeholder="例如：三年级1班张小明">
            <button id="enterBtn" onclick="startChat()">进入观察档案 ✨</button>
        </div>
    </div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.3/libs/cn/index.js"></script>
    <script>
        const MY_BOT_ID = '7628621142705831979'; 
        const API_ENDPOINT = '/api/getToken'; 

        // 核心逻辑：彻底清除缓存
        async function clearCozeCache() {
            localStorage.removeItem('sangsang_student_id');
            // 暴力删除扣子SDK生成的数据库，这是解决“串号”的关键
            if (window.indexedDB) {
                const dbs = ['coze-chat-sdk', 'coze-web-sdk', 'localforage'];
                dbs.forEach(db => window.indexedDB.deleteDatabase(db));
            }
        }

        function resetAndReload() {
            if(confirm('确定要切换同学并清除当前记录吗？')) {
                clearCozeCache();
                location.reload();
            }
        }

        // 检查是否已有登录记录
        const savedName = localStorage.getItem('sangsang_student_id');
        if (savedName) {
            document.getElementById('welcome-mask').style.display = 'none';
            document.getElementById('switchUserBtn').style.display = 'block';
            initCoze(savedName);
        }

        async function startChat() {
            const name = document.getElementById('studentInput').value.trim();
            if (!name) return alert('请先输入班级姓名哦！');
            
            // 第一次登录前也清理一次，防患于未然
            await clearCozeCache();
            localStorage.setItem('sangsang_student_id', name);
            location.reload(); // 刷新以应用清理并进入 initCoze
        }

        async function initCoze(userId) {
            try {
                // 向后台请求专属 Token
                const res = await fetch(API_ENDPOINT + '?name=' + encodeURIComponent(userId));
                const data = await res.json();
                
                if (!data.token) throw new Error(data.error || '获取Token失败');

                new CozeWebSDK.WebChatClient({
                    config: { bot_id: MY_BOT_ID },
                    componentProps: { title: '蚕宝宝守护精灵桑桑 🌿' },
                    auth: { 
                        type: 'token', 
                        token: data.token, 
                        onRefreshToken: () => data.token 
                    },
                    // 👇 关键：使用姓名作为唯一ID，确保扣子拉取对应的历史记录
                    userInfo: { id: userId, nickname: userId },
                    ui: {
                        base: { lang: 'zh-CN' },
                        asstBtn: { isNeed: false },
                        footer: { isNeed: true }
                    }
                }).showChatBot();

            } catch (e) {
                alert('连接失败：' + e.message);
                clearCozeCache();
                location.reload();
            }
        }
    </script>
</body>
</html>
