<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蚕宝宝守护精灵桑桑</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f6ffed; font-family: sans-serif; }
        #welcome-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e6f7ff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 85%; text-align: center; }
        h2 { color: #52c41a; font-size: 24px; }
        p { font-size: 18px; color: #595959; }
        input { width: 90%; padding: 15px; margin: 20px 0; border: 2px solid #b7eb8f; border-radius: 8px; font-size: 18px; outline: none; box-sizing: border-box; }
        button { background: #52c41a; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:disabled { background: #b7eb8f; cursor: not-allowed; }
        #timerText { font-size: 14px; color: #8c8c8c; margin-top: 15px; display: none; }
        
        #switchUserBtn {
            position: fixed; top: 15px; right: 15px; z-index: 10000;
            background: rgba(255,255,255,0.9); padding: 6px 12px; border-radius: 20px;
            font-size: 13px; color: #595959; border: 1px solid #d9d9d9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; display: none;
        }
    </style>
</head>
<body>
    <div id="switchUserBtn" onclick="resetUser()">🔄 切换同学/换设备</div>

    <div id="welcome-mask">
        <div class="box">
            <h2>🌿 欢迎来到科学探究乐园</h2>
            <p>我是桑桑老师，请输入你的班级和姓名。下次用同一部手机就不需要再填啦！</p>
            <input type="text" id="studentInput" placeholder="例如：五年级1班张小明">
            <button id="enterBtn" onclick="startChat()">进入观察档案 ✨</button>
            <div id="timerText">正在唤醒桑桑老师，用时：<span id="timeCount">0.0</span> 秒...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 【核心大扫除逻辑】：在钉钉/微信锁定数据库前，提前拦截并清空！
        // ==========================================
        if (window.location.search.includes('clear=1')) {
            document.body.innerHTML = '<div style="display:flex; height:100vh; align-items:center; justify-content:center; background:#e6f7ff; color:#52c41a; font-size:20px; font-weight:bold;">🌿 正在为您深度清理并切换账号...</div>';
            
            // 1. 撕掉表面名字标签
            localStorage.clear();
            sessionStorage.clear();
            
            // 2. 砸碎底层顽固数据库（针对钉钉/微信）
            if (window.indexedDB) {
                // 扫射所有能找到的数据库
                if (window.indexedDB.databases) {
                    window.indexedDB.databases().then(dbs => {
                        dbs.forEach(db => window.indexedDB.deleteDatabase(db.name));
                    }).catch(e => console.log('浏览器不支持获取数据库列表'));
                }
                // 精准点杀 Coze 的底层缓存
                window.indexedDB.deleteDatabase('coze-chat-sdk');
                window.indexedDB.deleteDatabase('coze-web-sdk');
                window.indexedDB.deleteDatabase('localforage');
                window.indexedDB.deleteDatabase('bot-chat');
            }
            
            // 3. 打扫完毕，摘掉打扫令牌，干干净净重新开门
            setTimeout(() => {
                window.location.href = window.location.pathname;
            }, 1000); // 留出1秒钟给钉钉处理深层删除
            
            throw new Error('拦截执行，进行大扫除中...'); // 强制中止后面的代码加载
        }
    </script>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.3/libs/cn/index.js"></script>
    <script>
        const MY_BOT_ID = '7628621142705831979'; 
        const LAF_API_URL = 'https://gm5ve3gmrf.sealosbja.site/getToken'; 
        let timerInterval;

        const savedName = localStorage.getItem('sangsang_student_id');
        if (savedName) {
            document.getElementById('welcome-mask').style.display = 'none';
            document.getElementById('switchUserBtn').style.display = 'block';
            fetchTokenAndInit(savedName); 
        }

        function resetUser() {
            if(confirm('二胎家庭切换同学时，系统将深度清理缓存防止记录混淆（云端数据安全）。确定要切换吗？')) {
                // 【发号施令】：带上打扫令牌，重新加载网页
                window.location.href = window.location.pathname + '?clear=1';
            }
        }

        function startChat() {
            const name = document.getElementById('studentInput').value.trim();
            if (!name) return alert('同学们，记得输入班级和姓名哦！');
            
            const btn = document.getElementById('enterBtn');
            btn.disabled = true;
            btn.innerText = '正在连接数据库...';
            
            const startTime = Date.now();
            document.getElementById('timerText').style.display = 'block';
            timerInterval = setInterval(() => {
                const cost = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('timeCount').innerText = cost;
            }, 100);

            localStorage.setItem('sangsang_student_id', name);
            fetchTokenAndInit(name); 
        }

        async function fetchTokenAndInit(userId) {
            try {
                const res = await fetch(LAF_API_URL);
                const data = await res.json();
                
                const cozeClient = new CozeWebSDK.WebChatClient({
                    config: { bot_id: MY_BOT_ID },
                    componentProps: { title: '蚕宝宝守护精灵桑桑 🌿' },
                    auth: { type: 'token', token: data.token, onRefreshToken: () => data.token },
                    userInfo: { id: userId, nickname: userId },
                    ui: {
                        base: { lang: 'zh-CN' },
                        chatBot: { isNeedAudio: true },
                        asstBtn: { isNeed: false }
                    }
                });

                setTimeout(() => {
                    clearInterval(timerInterval);
                    document.getElementById('welcome-mask').style.display = 'none';
                    document.getElementById('switchUserBtn').style.display = 'block';
                    cozeClient.showChatBot();
                }, 500);

            } catch(e) {
                clearInterval(timerInterval);
                alert('连接遇到小问题：\n' + e.message + '\n请刷新重试！');
                document.getElementById('enterBtn').disabled = false;
                document.getElementById('enterBtn').innerText = '进入观察档案 ✨';
            }
        }
    </script>
</body>
</html>
