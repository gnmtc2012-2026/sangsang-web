<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蚕宝宝守护精灵桑桑</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f6ffed; font-family: sans-serif; }
        #welcome-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e6f7ff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 85%; text-align: center; }
        h2 { color: #52c41a; font-size: 24px; margin-top: 0; }
        p { font-size: 16px; color: #595959; }
        input { width: 90%; padding: 15px; margin: 15px 0; border: 2px solid #b7eb8f; border-radius: 8px; font-size: 18px; outline: none; box-sizing: border-box; }
        button { background: #52c41a; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px;}
        button:disabled { background: #b7eb8f; cursor: not-allowed; }
        
        /* 隐形切换按钮 */
        #switchUserBtn {
            position: fixed; top: 10px; right: 10px; z-index: 10000;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(4px);
            padding: 5px 10px; border-radius: 12px; font-size: 12px; color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.08); cursor: pointer; display: none; transition: all 0.3s ease;
        }
        #switchUserBtn:active, #switchUserBtn:hover { background: rgba(255, 255, 255, 0.95); color: #52c41a; border-color: #b7eb8f; }
    </style>
</head>
<body>
    <div id="switchUserBtn" onclick="resetName()">🔄 切换同学</div>

    <div id="welcome-mask">
        <div class="box">
            <h2>🌿 欢迎来到科学探究乐园</h2>
            <p>我是桑桑老师，请输入班级姓名，开启今天的记录吧！</p>
            <input type="text" id="studentInput" placeholder="例如：三年级1班张小明">
            <button id="enterBtn" onclick="startChat()">进入观察档案 ✨</button>
        </div>
    </div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.3/libs/cn/index.js"></script>
    <script>
        const MY_BOT_ID = '7628621142705831979'; 
        const VERCEL_API_URL = '/api/getToken'; 

        const savedName = localStorage.getItem('sangsang_student_id');
        if (savedName) {
            document.getElementById('studentInput').style.display = 'none';
            document.querySelector('.box p').style.display = 'none';
            document.getElementById('enterBtn').innerText = '正在打开今天的日记...';
            document.getElementById('enterBtn').disabled = true;
            
            setTimeout(() => {
                document.getElementById('welcome-mask').style.display = 'none';
                document.getElementById('switchUserBtn').style.display = 'block';
                fetchTokenAndInit(savedName); 
            }, 800); 
        }

        // 强力脱困版切换逻辑（解决双胞胎串号缓存）
        function resetName() {
            if(confirm('家里有两个孩子需要切换，或想要修改姓名吗？')) {
                localStorage.removeItem('sangsang_student_id');
                if (window.indexedDB) {
                    window.indexedDB.deleteDatabase('coze-chat-sdk');
                    window.indexedDB.deleteDatabase('coze-web-sdk');
                }
                location.reload();
            }
        }

        function startChat() {
            const name = document.getElementById('studentInput').value.trim();
            if (!name) return alert('同学们，记得输入班级和姓名哦！');
            
            const btn = document.getElementById('enterBtn');
            btn.disabled = true;
            btn.innerText = '正在连接数据库...';
            
            localStorage.setItem('sangsang_student_id', name);
            fetchTokenAndInit(name); 
        }

        async function fetchTokenAndInit(userId) {
            try {
                const requestUrl = VERCEL_API_URL + '?name=' + encodeURIComponent(userId);
                const res = await fetch(requestUrl);
                const data = await res.json();
                
                // 👇 拦截报错：如果后台没发下来房卡，直接弹窗告诉老师原因
                if (!data.token) {
                    alert("后台连接失败！原因：" + (data.error || "未知错误"));
                    document.getElementById('enterBtn').disabled = false;
                    document.getElementById('enterBtn').innerText = '重试 ✨';
                    return; 
                }

                const cozeClient = new CozeWebSDK.WebChatClient({
                    config: { bot_id: MY_BOT_ID },
                    componentProps: { title: '蚕宝宝守护精灵桑桑 🌿' },
                    auth: { type: 'token', token: data.token, onRefreshToken: () => data.token },
                    userInfo: { id: userId, nickname: userId },
                    ui: {
                        base: { lang: 'zh-CN' },
                        chatBot: { isNeedAudio: true },
                        asstBtn: { isNeed: false }
                    }
                });

                setTimeout(() => {
                    document.getElementById('welcome-mask').style.display = 'none';
                    document.getElementById('switchUserBtn').style.display = 'block';
                    cozeClient.showChatBot();
                }, 300);

            } catch(e) {
                alert('网络连接遇到小问题：\n' + e.message + '\n请刷新重试！');
                document.getElementById('enterBtn').disabled = false;
                document.getElementById('enterBtn').innerText = '进入观察档案 ✨';
            }
        }
    </script>
</body>
</html>
