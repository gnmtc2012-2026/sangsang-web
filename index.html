<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蚕宝宝守护精灵桑桑</title>
    <style>
        /* 移动端丝滑滚动配置 */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overscroll-behavior: none; -webkit-overflow-scrolling: touch; touch-action: manipulation; 
            background-color: #f6ffed; font-family: sans-serif; 
        }
        #welcome-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e6f7ff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 85%; text-align: center; }
        h2 { color: #52c41a; font-size: 24px; margin-top: 0; }
        p { font-size: 16px; color: #595959; }
        
        /* 统一选择框和输入框样式 */
        select, input { 
            width: 90%; padding: 12px; margin: 10px 0; 
            border: 2px solid #b7eb8f; border-radius: 8px; 
            font-size: 16px; outline: none; box-sizing: border-box; 
        }
        select { background-color: white; color: #595959; }
        
        button { background: #52c41a; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px;}
        
        #switchUserBtn {
            position: fixed; top: 10px; right: 10px; z-index: 10000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px);
            padding: 8px 15px; border-radius: 20px; font-size: 13px; color: #52c41a;
            border: 1px solid #b7eb8f; cursor: pointer; display: none;
        }
    </style>
</head>
<body>
    <div id="switchUserBtn" onclick="resetAndReload()">🔄 切换同学</div>

    <div id="welcome-mask">
        <div class="box">
            <h2>🌿 蚕宝宝守护精灵桑桑</h2>
            <p>请输入你的班级和姓名：</p>
            
            <select id="classSelect">
                <option value="" disabled selected>选择你的班级 👇</option>
                <option value="三年级1班">三年级1班</option>
                <option value="三年级2班">三年级2班</option>
                <option value="三年级3班">三年级3班</option>
                <option value="三年级4班">三年级4班</option>
                <option value="三年级5班">三年级5班</option>
                <option value="三年级6班">三年级6班</option>
                <option value="三年级7班">三年级7班</option>
                <option value="三年级8班">三年级8班</option>
                <option value="三年级9班">三年级9班</option>
                <option value="三年级10班">三年级10班</option>
                <option value="三年级11班">三年级11班</option>
                <option value="三年级12班">三年级12班</option>
            </select>
            
            <input type="text" id="nameInput" placeholder="请输入真实姓名">
            
            <button onclick="startChat()">进入观察档案 ✨</button>
        </div>
    </div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.3/libs/cn/index.js"></script>
    <script>
        const MY_BOT_ID = '7628621142705831979'; 

        // 清理缓存逻辑
        async function clearCozeCache() {
            localStorage.clear();
            if (window.indexedDB) {
                const dbs = ['coze-chat-sdk', 'coze-web-sdk', 'localforage'];
                dbs.forEach(db => { try { window.indexedDB.deleteDatabase(db); } catch(e) {} });
            }
        }

        // 切换同学：清理并刷新
        function resetAndReload() {
            if(confirm('确定要退出当前账号并切换同学吗？')) {
                clearCozeCache().then(() => location.reload());
            }
        }

        // 读取本地存储
        const savedName = localStorage.getItem('sangsang_student_id');
        if (savedName) {
            document.getElementById('welcome-mask').style.display = 'none';
            document.getElementById('switchUserBtn').style.display = 'block';
            initCoze(savedName);
        }

        // 登录按钮点击
        async function startChat() {
            const studentClass = document.getElementById('classSelect').value;
            const studentName = document.getElementById('nameInput').value.trim();
            
            if (!studentClass) return alert('请先选择班级哦！');
            if (!studentName) return alert('别忘了输入姓名呀！');
            
            const fullName = studentClass + studentName; // 拼接成：三年级1班张小明
            
            await clearCozeCache();
            localStorage.setItem('sangsang_student_id', fullName);
            location.reload(); 
        }

        // 初始化智能体
        async function initCoze(userName) {
            try {
                // 请求授权 Token
                const res = await fetch('/api/getToken?name=' + encodeURIComponent(userName));
                const data = await res.json();
                
                if (!data.token) throw new Error(data.error || '连接失败');

                new CozeWebSDK.WebChatClient({
                    config: { 
                        bot_id: MY_BOT_ID,
                        isIframe: false 
                    },
                    componentProps: { title: userName + ' 的观察档案 🌿' },
                    auth: { 
                        type: 'token', 
                        token: data.token, 
                        onRefreshToken: () => data.token 
                    },
                    userInfo: { id: userName, nickname: userName },
                    ui: {
                        base: { lang: 'zh-CN' },
                        asstBtn: { isNeed: false }
                    }
                }).showChatBot();

            } catch (e) {
                alert('连接小问题：' + e.message);
                await clearCozeCache();
                location.reload();
            }
        }
    </script>
</body>
</html>
